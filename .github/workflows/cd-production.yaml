name: wf-cd-production
on:
  push:
    branches:
      - production
jobs:
  build-production-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Rep
        uses: actions/checkout@v4
      - name: Build Website for Development
        run: |
          npx parcel build "./src/index.html" --dist-dir "./production" --public-url "./"
      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./production"
          name: "build-artifact-development"
  deploy-production-job:
    needs: "build-production-job"
    environment: "production-env"
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Development Artifact
        uses: actions/deploy-pages@v4
        with:
          artifact_name: "build-artifact-development"
          token: ${{github.token}}
