name: wf-ci-development
on:
  pull_request:
    branches:
      - develop
jobs:
  ci-development-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Lint HTML and CSS
        run: |
          npx htmlhint "**/*.html"  
          npx stylelint "**/*.css"
      - name: Test Build Ops
        run: npx parcel build "./src/index.html" --dist-dir "./dev" --public-url "./"
